name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "tamimystic@users.noreply.github.com"
          git config --global user.name "tamimystic"
          git push --force https://tamimystic:$HF_TOKEN@huggingface.co/spaces/tamimystic/Impact-of-Ai-on-Students main
