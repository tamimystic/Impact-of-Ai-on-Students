name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        uses: huggingface/hub-action@v0
        with:
          token: ${{ secrets.HF_TOKEN }}
          repo_id: tamimystic/Impact-of-Ai-on-Students
          repo_type: space
          local_dir: ./
          commit_message: "Sync from GitHub via CI/CD"
